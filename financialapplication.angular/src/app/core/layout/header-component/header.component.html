<mat-toolbar color="primary" class="app-header">
  <div class="logo-container">
    <div class="logo-wrapper">
      <mat-icon class="logo-icon">account_balance_wallet</mat-icon>
    </div>
    <span class="app-title" (click)="navigateToHome()">Financial Application</span>
  </div>

  <span class="spacer"></span>

  <div class="auth-actions">
    @if (!authService.isLoggedIn()) {
      <button mat-button class="signin-btn" (click)="authService.login()">
        <mat-icon>login</mat-icon>
        <span>Sign In</span>
      </button>
      <button mat-flat-button color="accent" class="register-btn" (click)="authService.register()">
        <mat-icon>person_add</mat-icon>
        <span>Register</span>
      </button>
    } @else {
      <span class="user-greeting">Hi, {{ this.username() }}</span>
      <button
        mat-icon-button
        [matMenuTriggerFor]="settingsMenu"
        class="mechanical-gear-btn"
        aria-label="Settings and insights"
      >
        <mat-icon>settings</mat-icon>
      </button>

      <mat-menu #settingsMenu="matMenu" xPosition="before" class="friendly-menu">
        <button mat-menu-item (click)="navigateToCategories()">
          <mat-icon>category</mat-icon>
          <span>My Categories</span>
        </button>

        <mat-divider></mat-divider>

        <button mat-menu-item (click)="authService.logout()" class="sign-out-item">
          <mat-icon color="warn">logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    }
  </div>
</mat-toolbar>
