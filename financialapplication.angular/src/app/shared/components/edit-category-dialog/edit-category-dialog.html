<h2 mat-dialog-title color="primary">Edit Category</h2>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="editForm" class="category-form">
    <mat-form-field appearance="outline">
      <mat-label>Category Name</mat-label>
      <input matInput formControlName="name" required />
      <mat-error *ngIf="editForm.get('name')?.hasError('required')"> Name is required. </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category Icon</mat-label>
      <mat-select formControlName="icon" required>
        <mat-select-trigger>
          <div class="icon-display-flex" *ngIf="editForm.get('icon')?.value as selectedIcon">
            <mat-icon color="primary">{{ selectedIcon }}</mat-icon>
            <span>{{ selectedIcon }}</span>
          </div>
        </mat-select-trigger>

        @for (icon of topIcons; track icon) {
          <mat-option [value]="icon">
            <div class="icon-display-flex">
              <mat-icon>{{ icon }}</mat-icon>
              <span>{{ icon }}</span>
            </div>
          </mat-option>
        }
      </mat-select>
      <mat-error *ngIf="editForm.get('icon')?.hasError('required')"> Icon is required. </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="editForm.invalid" (click)="onSave()">
    Save Changes
  </button>
</mat-dialog-actions>
