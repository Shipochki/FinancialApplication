<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create New Account</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="account-form">
        
        <mat-form-field appearance="outline">
          <mat-label>Account Name</mat-label>
          <input matInput formControlName="name" placeholder="e.g. Main Checking" required>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3" placeholder="Optional details..."></textarea>
        </mat-form-field>

        <div class="row-fields">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Initial Balance</mat-label>
            <input matInput type="number" step="0.01" formControlName="balance" required>
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Currency</mat-label>
            <mat-select formControlName="currency" required>
              <mat-option *ngFor="let currency of currencies" [value]="currency.value">
                {{ currency.label }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <button mat-flat-button color="primary" type="submit" [disabled]="accountForm.invalid">
          Create Account
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
